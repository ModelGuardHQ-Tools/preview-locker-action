name: Test PreviewLocker Fail On Risk

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-fail-on-risk:
    runs-on: ubuntu-latest

    steps:
      - name: Create locked preview link, scan, comment, and fail on risk
        uses: ModelGuardHQ-Tools/preview-locker-action@fail-on-risk-v1
        with:
          api_key: ${{ secrets.PREVIEW_LOCKER_API_KEY }}
          preview_url: https://example.com
          expires_in: 3600
          comment_on_pr: true
          scan_preview: true
          fail_on_risk: true
          github_token: ${{ secrets.GITHUB_TOKEN }}