---
name: 'PreviewLocker'
description: 'Create locked, expiring sharing links for CI/CD preview environments'
author: 'PreviewLocker'
branding:
  icon: 'lock'
  color: 'blue'
inputs:
  api_key:
    description: 'Your Preview Locker API key (from dashboard)'
    required: true
  preview_url:
    description: 'The URL of the static preview to lock'
    required: true
  expires_in:
    description: 'Time in seconds until the link expires (default: 3600)'
    required: false
    default: '3600'
outputs:
  url:
    description: 'Signed URL that redirects to your preview for the TTL period'
runs:
  using: 'node16'
  main: 'dist/index.js'
