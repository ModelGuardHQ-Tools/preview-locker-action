---
name: 'PreviewLocker'
description: 'Create expiring locked links for CI/CD previews'
author: 'PreviewLocker'
branding:
  icon: 'lock'
  color: 'blue'
inputs:
  api_key:
    description: 'Your Preview Locker API key (from dashboard)'
    required: true
  preview_url:
    description: 'The URL of the static preview to lock'
    required: true
  expires_in:
    description: 'Time in seconds until the link expires (default: 3600)'
    required: false
    default: '3600'
  comment_on_pr:
    description: 'Post the locked preview link as a pull request comment'
    required: false
    default: 'false'
  github_token:
    description: 'Token used to create or update the PR comment'
    required: false
  scan_preview:
    description: 'Run basic preview URL checks'
    required: false
    default: 'false'
  scan_timeout_ms:
    description: 'Timeout for each preview check'
    required: false
    default: '5000'
  fail_on_risk:
    description: 'Fail workflow when preview checks warn'
    required: false
    default: 'false'
outputs:
  url:
    description: 'Locked preview URL'
runs:
  using: 'node16'
  main: 'dist/index.js'
